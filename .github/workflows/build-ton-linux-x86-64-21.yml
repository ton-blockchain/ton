name: Ubuntu TON build (x86-64, clang-21)

on:
  pull_request:
    branches: [master, testnet]
    types: [opened, reopened, synchronize]
  push:
    branches: [master, testnet]
  workflow_dispatch:
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04]
    runs-on: ${{ matrix.os }}

    steps:
    - name: Check out repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        submodules: 'recursive'

    - name: Date Stamp
      shell: bash
      id: date-stamp
      run: |
        echo "timestamp=$(date -u "+%Y%m%d%H%M_%S")" >> "$GITHUB_OUTPUT"

    - name: Install system libraries
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential git cmake ninja-build libjemalloc-dev ccache
        mkdir ~/.ccache

    - name: Install clang-21
      if: matrix.os != 'ubuntu-24.04'
      run: |
        wget https://apt.llvm.org/llvm.sh
        chmod +x llvm.sh
        sudo ./llvm.sh 21 clang

    - name: Install clang-21
      if: matrix.os == 'ubuntu-24.04'
      run: |
        lsb_release -a
        wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo apt-key add -
        echo "deb http://apt.llvm.org/noble/ llvm-toolchain-noble-21 main" | sudo tee /etc/apt/sources.list.d/llvm.list
        sudo apt -y update
        sudo apt install -y clang-21

    - name: Restore cache TON
      id: cache-ton
      uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
      with:
        path: ~/.ccache
        key: ${{ runner.os }}-${{ runner.arch }}-${{ matrix.os }}-clang-21-shared-ccache-${{ steps.date-stamp.outputs.timestamp }}
        restore-keys: ${{ runner.os }}-${{ runner.arch }}-${{ matrix.os }}-clang-21-shared-ccache

    - name: Build TON
      run: |
        git submodule sync --recursive
        git submodule update
        cp assembly/native/build-ubuntu-shared-21.sh .
        chmod +x build-ubuntu-shared-21.sh
        ./build-ubuntu-shared-21.sh -t -c

    - name: Print ccache stats after TON build
      if: ${{ always() }}
      run: |
        ccache -sp
        ccache -z

    - name: Save cache TON
      if: ${{ success() }}
      uses: actions/cache/save@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
      with:
        path: ~/.ccache
        key: ${{ steps.cache-ton.outputs.cache-primary-key }}

    - name: Delete restored cache TON
      if: ${{ success() && steps.cache-ton.outputs.cache-matched-key != '' && steps.cache-ton.outputs.cache-matched-key != steps.cache-ton.outputs.cache-primary-key }}
      env:
        GH_TOKEN: ${{ github.token }}
        CACHE_KEY: ${{ steps.cache-ton.outputs.cache-matched-key }}
      run: |
        echo "Deleting restored cache: ${CACHE_KEY} for ${GITHUB_REF}"
        gh cache delete "${CACHE_KEY}" --repo "${GITHUB_REPOSITORY}" --ref "${GITHUB_REF}" || true

    - name: Run unit tests
      run: |
        cd build
        ctest --output-on-failure --timeout 1800

    - name: Prepare Python environment
      run: |
        curl -LsSf https://astral.sh/uv/install.sh | sh
        uv sync --no-dev
        uv run test/tontester/generate_tl.py

    - name: Run tontester tests
      run: |
        uv run pytest

    - name: Run integration tests
      run: |
        for script in test/integration/*.py; do
          echo $script
          uv run $script
        done

    - name: Run tonlib integration test
      run: |
        ./test/tonlib/integration/test_integration.sh
