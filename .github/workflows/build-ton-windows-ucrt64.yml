name: MSYS2 UCRT64 Build

on:
  pull_request:
    branches: [master, testnet]
    types: [opened, reopened, synchronize]
  push:
    branches: [master, testnet]
  workflow_dispatch:
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-latest

    defaults:
      run:
        shell: msys2 {0}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          submodules: 'recursive'

      - name: Setup MSYS2 and Install Packages
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true

      - name: Run Build Script
        run: |
          echo "Running in MSYS2 UCRT64 environment!"
          cp assembly/msys2/build-ucrt64.sh .
          chmod +x build-ucrt64.sh
          ./build-ucrt64.sh -a

      - name: Upload artifacts
        uses: actions/upload-artifact@master
        with:
          name: ton-msys2-ucrt64
          path: artifacts
          retention-days: 14
