name: Ubuntu TON build (AppImages, arm64)

on:
  pull_request:
    branches: [master, testnet]
    types: [opened, reopened, synchronize]
  push:
    branches: [master, testnet]
  workflow_dispatch:
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: write

jobs:
  build:
    runs-on: ubuntu-22.04-arm

    steps:
    - name: Check out repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        submodules: 'recursive'

    - name: Date Stamp
      shell: bash
      id: date-stamp
      run: |
        echo "timestamp=$(date -u "+%Y%m%d%H%M_%S")" >> "$GITHUB_OUTPUT"

    - name: Install system libraries
      run: |
        sudo apt update
        sudo apt install -y build-essential git cmake ninja-build ccache libgsl-dev libblas-dev libgslcblas0
        mkdir ~/.ccache

    - name: Install clang-22
      run: |
        lsb_release -a
        wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo apt-key add -
        echo "deb http://apt.llvm.org/jammy/ llvm-toolchain-jammy-22 main" | sudo tee /etc/apt/sources.list.d/llvm.list
        sudo apt-get -y update
        sudo apt-get install -y clang-22

    - name: Restore cache TON
      id: cache-ton
      uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
      with:
        path: ~/.ccache
        key: ${{ runner.os }}-${{ runner.arch }}-ubuntu-22.04-arm-clang-22-portable-ccache-${{ steps.date-stamp.outputs.timestamp }}
        restore-keys: ${{ runner.os }}-${{ runner.arch }}-ubuntu-22.04-arm-clang-22-portable-ccache

    - name: Build TON
      run: |
        git submodule sync --recursive
        git submodule update
        cp assembly/native/build-ubuntu-appimages.sh .
        chmod +x build-ubuntu-appimages.sh
        ./build-ubuntu-appimages.sh -a -c

    - name: Print ccache stats after TON build
      if: ${{ always() }}
      run: |
        ccache -sp
        ccache -z

    - name: Save cache TON
      if: ${{ success() }}
      uses: actions/cache/save@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
      with:
        path: ~/.ccache
        key: ${{ steps.cache-ton.outputs.cache-primary-key }}

    - name: Delete restored cache TON
      if: ${{ success() && steps.cache-ton.outputs.cache-matched-key != '' && steps.cache-ton.outputs.cache-matched-key != steps.cache-ton.outputs.cache-primary-key }}
      env:
        GH_TOKEN: ${{ github.token }}
        CACHE_KEY: ${{ steps.cache-ton.outputs.cache-matched-key }}
      run: |
        echo "Deleting restored cache: ${CACHE_KEY} for ${GITHUB_REF}"
        gh cache delete "${CACHE_KEY}" --repo "${GITHUB_REPOSITORY}" --ref "${GITHUB_REF}" || true

    - name: Make AppImages
      run: |
        cp assembly/appimage/create-appimages.sh .
        cp assembly/appimage/AppRun .
        cp assembly/appimage/ton.png .
        chmod +x create-appimages.sh
        ./create-appimages.sh aarch64
        rm -rf artifacts

    - name: Restore cache TON libs
      id: cache-ton-libs
      uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
      with:
        path: ~/.ccache
        key: ${{ runner.os }}-${{ runner.arch }}-ubuntu-22.04-arm-clang-22-portable-libs-ccache-${{ steps.date-stamp.outputs.timestamp }}
        restore-keys: ${{ runner.os }}-${{ runner.arch }}-ubuntu-22.04-arm-clang-22-portable-libs-ccache

    - name: Build TON libs
      run: |
        cp assembly/native/build-ubuntu-portable-libs.sh .
        chmod +x build-ubuntu-portable-libs.sh
        ./build-ubuntu-portable-libs.sh -a -c
        cp ./artifacts/libtonlibjson.so appimages/artifacts/
        cp ./artifacts/libemulator.so appimages/artifacts/

    - name: Print ccache stats after TON libs build
      if: ${{ always() }}
      run: |
        ccache -sp
        ccache -z

    - name: Save cache TON libs
      if: ${{ success() }}
      uses: actions/cache/save@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
      with:
        path: ~/.ccache
        key: ${{ steps.cache-ton-libs.outputs.cache-primary-key }}

    - name: Delete restored cache TON libs
      if: ${{ success() && steps.cache-ton-libs.outputs.cache-matched-key != '' && steps.cache-ton-libs.outputs.cache-matched-key != steps.cache-ton-libs.outputs.cache-primary-key }}
      env:
        GH_TOKEN: ${{ github.token }}
        CACHE_KEY: ${{ steps.cache-ton-libs.outputs.cache-matched-key }}
      run: |
        echo "Deleting restored cache: ${CACHE_KEY} for ${GITHUB_REF}"
        gh cache delete "${CACHE_KEY}" --repo "${GITHUB_REPOSITORY}" --ref "${GITHUB_REF}" || true

    - name: Upload artifacts
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
      with:
        name: ton-arm64-linux
        path: appimages/artifacts
        retention-days: 14
        if-no-files-found: error
