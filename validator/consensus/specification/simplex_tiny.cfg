\* Tiny model: 3 validators, 1 slot, very small message budget — terminates fast.
CONSTANTS
    NumValidators = 3
    ByzantineSet <- NoByzantine
    LeaderWindowSize = 1
    MaxSlot = 1
    MaxMessages = 2
    EnableMessageDrop = FALSE
    EnableByzantineEquivocation = FALSE
    EnableByzantineWithholding = FALSE

CONSTANT Weight <- UniformWeight1
CONSTANT ValidSeq <- AlwaysValidSeq

SPECIFICATION SafetySpec

INVARIANT TypeOK
INVARIANT FinalSkipExclusion
INVARIANT UniqueNotarization
INVARIANT UniqueFinalization
INVARIANT FinalizationImpliesNotarization
INVARIANT HonestVoteConsistency
INVARIANT HonestNotarUniqueness
INVARIANT HonestLeaderNoEquivocation
INVARIANT SafetyInvariant
INVARIANT ChainPrefixSafety
INVARIANT OutputLogConsistency

CONSTRAINT StateConstraint
